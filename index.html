<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="calc-shell">

    <!-- Header -->
    <div class="calc-header">
      <span class="calc-brand">Calc</span>
      <div class="calc-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <!-- Display -->
    <div class="calc-display">
      <div class="calc-expr" id="expression">&nbsp;</div>
      <div class="calc-result" id="display">0</div>
    </div>

    <!-- Keypad -->
    <div class="calc-keypad">

      <!-- Row 1 -->
      <button class="btn-calc btn-clear" data-action="clear">AC</button>
      <button class="btn-calc btn-op"    data-action="sign">+/−</button>
      <button class="btn-calc btn-op"    data-action="percent">%</button>
      <button class="btn-calc btn-op"    data-action="operator" data-value="÷">÷</button>

      <!-- Row 2 -->
      <button class="btn-calc btn-num" data-action="digit" data-value="7">7</button>
      <button class="btn-calc btn-num" data-action="digit" data-value="8">8</button>
      <button class="btn-calc btn-num" data-action="digit" data-value="9">9</button>
      <button class="btn-calc btn-op"  data-action="operator" data-value="×">×</button>

      <!-- Row 3 -->
      <button class="btn-calc btn-num" data-action="digit" data-value="4">4</button>
      <button class="btn-calc btn-num" data-action="digit" data-value="5">5</button>
      <button class="btn-calc btn-num" data-action="digit" data-value="6">6</button>
      <button class="btn-calc btn-op"  data-action="operator" data-value="−">−</button>

      <!-- Row 4 -->
      <button class="btn-calc btn-num" data-action="digit" data-value="1">1</button>
      <button class="btn-calc btn-num" data-action="digit" data-value="2">2</button>
      <button class="btn-calc btn-num" data-action="digit" data-value="3">3</button>
      <button class="btn-calc btn-op"  data-action="operator" data-value="+">+</button>

      <!-- Row 5 -->
      <button class="btn-calc btn-num btn-wide" data-action="digit" data-value="0">0</button>
      <button class="btn-calc btn-num"          data-action="decimal">.</button>
      <button class="btn-calc btn-eq"           data-action="equals">=</button>

    </div>

    <div class="calc-footer">v1.0 · Basic Calculator</div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Calculator Logic -->
  <script src="script.js"></script>

</body>
</html>
